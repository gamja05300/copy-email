<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Email Copy</title>

<style>
:root {
  --text: #37352f;
  --muted: rgba(55, 53, 47, 0.65);
  --button-bg: #f7f6f3;
  --button-hover: #efeeeb;
  --success: #0f7b0f;
}

@media (prefers-color-scheme: dark) {
  :root {
    --text: #e9e9e7;
    --muted: rgba(233, 233, 231, 0.65);
    --button-bg: #2a2a2a;
    --button-hover: #333333;
    --success: #4ade80;
  }
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family:
    ui-sans-serif,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Helvetica,
    Arial,
    sans-serif;
}

.container {
  width: 100%;
  padding: 12px;
}

.label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

.email-button {
  width: 100%;
  border: none;
  border-radius: 8px;
  padding: 12px 16px;
  cursor: pointer;

  background: var(--button-bg);
  color: var(--text);

  font-size: 14px;
  font-weight: 500;

  transition: all 0.15s ease;
}

.email-button:hover {
  background: var(--button-hover);
}

.status {
  margin-top: 8px;
  font-size: 12px;
  color: var(--success);
  opacity: 0;
  transition: opacity 0.2s ease;
}

.status.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">
  <div class="label">Email</div>

  <button class="email-button" id="copyBtn">
    gamja05300@gmail.com
  </button>

  <div class="status" id="status">
    ✓ Copied
  </div>
</div>

<script>
const email = "gamja05300@gmail.com";
const btn = document.getElementById("copyBtn");
const status = document.getElementById("status");

btn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(email);

    btn.textContent = "Copied!";
    status.classList.add("show");

    setTimeout(() => {
      btn.textContent = email;
      status.classList.remove("show");
    }, 2000);

  } catch {
    btn.textContent = "Copy failed";

    setTimeout(() => {
      btn.textContent = email;
    }, 2000);
  }
});
</script>

</body>
</html>
