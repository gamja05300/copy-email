<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Email Copy</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border: 1px solid #e5e5e5;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(15, 15, 15, 0.05);
  }

  .label {
    font-size: 13px;
    color: #787878;
    margin-bottom: 10px;
  }

  .email-box {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .email {
    flex: 1;
    background: #f7f7f7;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    color: #222;
    cursor: pointer;
    transition: 0.2s;
    word-break: break-all;
  }

  .email:hover {
    background: #efefef;
  }

  .copy-btn {
    border: none;
    background: #111;
    color: white;
    padding: 12px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: 0.2s;
  }

  .copy-btn:hover {
    opacity: 0.9;
  }

  .toast {
    margin-top: 12px;
    font-size: 13px;
    color: #16a34a;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .toast.show {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="card">
  <div class="label">이메일 문의</div>

  <div class="email-box">
    <div class="email" onclick="copyEmail()">
      gamja05300@gmail.com
    </div>

    <button class="copy-btn" onclick="copyEmail()">
      복사
    </button>
  </div>

  <div id="toast" class="toast">
    ✓ 이메일 주소가 복사되었습니다.
  </div>
</div>

<script>
function copyEmail() {
  const email = "gamja05300@gmail.com";

  navigator.clipboard.writeText(email).then(() => {
    const toast = document.getElementById("toast");
    toast.classList.add("show");

    setTimeout(() => {
      toast.classList.remove("show");
    }, 2000);
  });
}
</script>

</body>
</html>
