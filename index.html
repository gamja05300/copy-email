<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Email Copy</title>

<style>
:root {
  --text: #37352f;
  --muted: #787774;
  --border: rgba(55, 53, 47, 0.12);
  --button-bg: rgba(55, 53, 47, 0.08);
  --button-hover: rgba(55, 53, 47, 0.12);
  --success: #0f9d58;
}

@media (prefers-color-scheme: dark) {
  :root {
    --text: rgba(255,255,255,0.92);
    --muted: rgba(255,255,255,0.55);
    --border: rgba(255,255,255,0.14);
    --button-bg: rgba(255,255,255,0.08);
    --button-hover: rgba(255,255,255,0.14);
    --success: #4ade80;
  }
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  background: transparent;
  font-family:
    Inter,
    ui-sans-serif,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}

body {
  padding: 12px;
}

.container {
  width: 100%;
  max-width: 520px;
}

.label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

.email-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.email-box {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;

  border: 1px solid var(--border);
  border-radius: 10px;

  padding: 12px 14px;

  color: var(--text);
  cursor: pointer;

  transition: all 0.15s ease;
}

.email-box:hover {
  background: var(--button-bg);
}

.icon {
  font-size: 16px;
  flex-shrink: 0;
}

.email-text {
  font-size: 14px;
  overflow-wrap: anywhere;
}

.copy-btn {
  border: none;
  border-radius: 10px;

  background: var(--button-bg);
  color: var(--text);

  padding: 12px 16px;

  font-size: 14px;
  font-weight: 500;

  cursor: pointer;

  transition: all 0.15s ease;
}

.copy-btn:hover {
  background: var(--button-hover);
}

.toast {
  margin-top: 10px;
  font-size: 13px;
  color: var(--success);

  opacity: 0;
  transform: translateY(-2px);

  transition:
    opacity 0.2s ease,
    transform 0.2s ease;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 480px) {
  .email-row {
    flex-direction: column;
  }

  .copy-btn {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="label">Contact</div>

  <div class="email-row">
    <div class="email-box" onclick="copyEmail()">
      <span class="icon">✉️</span>
      <span class="email-text">
        gamja05300@gmail.com
      </span>
    </div>

    <button class="copy-btn" onclick="copyEmail()">
      복사
    </button>
  </div>

  <div id="toast" class="toast">
    ✓ 이메일 주소가 복사되었습니다.
  </div>
</div>

<script>
function copyEmail() {
  const email = "gamja05300@gmail.com";

  navigator.clipboard.writeText(email).then(() => {
    const toast = document.getElementById("toast");

    toast.classList.add("show");

    setTimeout(() => {
      toast.classList.remove("show");
    }, 2000);
  });
}
</script>

</body>
</html>
