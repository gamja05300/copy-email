<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Email Copy Button</title>

<style>
:root {
  --bg: #ffffff;
  --text: #37352f;
  --border: rgba(55, 53, 47, 0.16);
  --button-bg: #f7f6f3;
  --button-hover: #efeeeb;
  --success: #0f7b0f;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #191919;
    --text: #e9e9e7;
    --border: rgba(255,255,255,0.12);
    --button-bg: #2a2a2a;
    --button-hover: #333333;
    --success: #4ade80;
  }
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 16px;
  background: transparent;
  font-family:
    ui-sans-serif,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Helvetica,
    Arial,
    sans-serif;
}

.card {
  max-width: 420px;
  margin: 0 auto;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}

.label {
  font-size: 13px;
  color: var(--text);
  opacity: 0.7;
  margin-bottom: 8px;
}

.row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.email {
  flex: 1;
  padding: 10px 12px;
  border-radius: 8px;
  background: var(--button-bg);
  color: var(--text);
  font-size: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 8px;
  padding: 10px 14px;
  background: var(--button-bg);
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.15s ease;
}

button:hover {
  background: var(--button-hover);
}

.status {
  margin-top: 8px;
  font-size: 12px;
  color: var(--success);
  opacity: 0;
  transition: opacity 0.2s ease;
}

.status.show {
  opacity: 1;
}
</style>
</head>

<body>
  <div class="card">
    <div class="label">이메일 문의</div>

    <div class="row">
      <div class="email" id="email">
        gamja05300@gmail.com
      </div>

      <button id="copyBtn">
        복사
      </button>
    </div>

    <div class="status" id="status">
      ✓ 이메일 주소가 복사되었습니다
    </div>
  </div>

<script>
const email = "gamja05300@gmail.com";
const btn = document.getElementById("copyBtn");
const status = document.getElementById("status");

btn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(email);

    status.classList.add("show");
    btn.textContent = "완료";

    setTimeout(() => {
      status.classList.remove("show");
      btn.textContent = "복사";
    }, 2000);
  } catch {
    const textarea = document.createElement("textarea");
    textarea.value = email;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);

    status.classList.add("show");
    setTimeout(() => {
      status.classList.remove("show");
    }, 2000);
  }
});
</script>
</body>
</html>
