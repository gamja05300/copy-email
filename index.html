<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Copy</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
}

.container {
    text-align: center;
    padding: 40px;
    max-width: 420px;
}

h1 {
    font-size: 26px;
    margin-bottom: 12px;
}

.email {
    font-size: 15px;
    color: #555;
    margin-bottom: 24px;
    word-break: break-all;
}

button {
    background: #111827;
    color: white;
    border: none;
    padding: 14px 22px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    opacity: 0.85;
}

.success {
    display: none;
    margin-top: 20px;
    color: #16a34a;
    font-weight: 600;
    font-size: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h1>📧 이메일 연락</h1>

    <div class="email">
        gamja05300@gmail.com
    </div>

    <button onclick="copyEmail()">
        이메일 복사
    </button>

    <div id="success" class="success">
        ✓ 복사 완료!<br>
        노션으로 돌아갑니다...
    </div>
</div>

<script>
const EMAIL = "gamja05300@gmail.com";
const RETURN_URL = "https://shelled-trust-317.notion.site/Gamja-27b02b0e9f5e8302978001943536484b?source=copy_link";

async function copyEmail() {
    try {
        await navigator.clipboard.writeText(EMAIL);

        document.getElementById("success").style.display = "block";

        setTimeout(() => {
            window.location.href = RETURN_URL;
        }, 1500);

    } catch (err) {
        alert("복사 실패! 이메일을 직접 복사해주세요.");
    }
}
</script>

</body>
</html>
