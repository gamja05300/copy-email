<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Email Copy</title>

<style>
:root {
  --bg: #ffffff;
  --text: #37352f;
  --border: rgba(55, 53, 47, 0.16);
  --button-bg: #f7f6f3;
  --button-hover: #efeeeb;
  --success: #0f7b0f;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #191919;
    --text: #e9e9e7;
    --border: rgba(255,255,255,0.12);
    --button-bg: #2a2a2a;
    --button-hover: #333333;
    --success: #4ade80;
  }
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 16px;
  background: transparent;
  font-family:
    ui-sans-serif,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Helvetica,
    Arial,
    sans-serif;
}

.card {
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}

.label {
  font-size: 13px;
  color: var(--text);
  opacity: 0.7;
  margin-bottom: 8px;
}

.email-button {
  width: 100%;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  padding: 12px 14px;
  background: var(--button-bg);
  color: var(--text);
  font-size: 14px;
  text-align: center;
  transition: background 0.15s ease;
}

.email-button:hover {
  background: var(--button-hover);
}

.status {
  margin-top: 8px;
  font-size: 12px;
  color: var(--success);
  opacity: 0;
  transition: opacity 0.2s ease;
}

.status.show {
  opacity: 1;
}
</style>
</head>

<body>
  <div class="card">
    <div class="label">Email</div>

    <button class="email-button" id="copyBtn">
      gamja05300@gmail.com
    </button>

    <div class="status" id="status">
      ✓ Copied
    </div>
  </div>

<script>
const email = "gamja05300@gmail.com";
const btn = document.getElementById("copyBtn");
const status = document.getElementById("status");

btn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(email);

    status.classList.add("show");
    btn.textContent = "Copied!";

    setTimeout(() => {
      status.classList.remove("show");
      btn.textContent = email;
    }, 2000);

  } catch (err) {
    btn.textContent = "Copy failed";

    setTimeout(() => {
      btn.textContent = email;
    }, 2000);
  }
});
</script>
</body>
</html>
